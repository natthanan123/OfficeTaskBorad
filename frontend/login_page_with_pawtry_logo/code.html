<!-- ─── Login API wiring ─── -->
<script>
  (function () {
    const API_BASE = 'http://localhost:3000/api';

    const form         = document.getElementById('login-form');
    const emailInput   = document.getElementById('email');
    const passInput    = document.getElementById('password');
    const submitBtn    = document.getElementById('login-submit');
    const errorBox     = document.getElementById('login-error');
    const errorText    = document.getElementById('login-error-text');
    const pwToggleBtn  = document.getElementById('password-toggle');
    const pwToggleIcon = document.getElementById('password-toggle-icon');
    const googleBtn    = document.getElementById('google-login');
    const forgotLink   = document.getElementById('forgot-password');

    // ── Password visibility toggle ──
    pwToggleBtn.addEventListener('click', () => {
      const isHidden = passInput.type === 'password';
      passInput.type = isHidden ? 'text' : 'password';
      pwToggleIcon.textContent = isHidden ? 'visibility_off' : 'visibility';
    });

    // ── Not-yet-implemented stubs ──
    googleBtn.addEventListener('click', () => {
      alert('Google Login is not yet implemented. This requires backend OAuth2 setup.');
    });

    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      alert('This feature is not yet implemented.');
    });

    function showError(message) {
      errorText.textContent = message;
      errorBox.classList.remove('hidden');
      errorBox.classList.add('flex');
    }

    function clearError() {
      errorBox.classList.add('hidden');
      errorBox.classList.remove('flex');
      errorText.textContent = '';
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? 'Signing in...' : 'Sign In';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email    = emailInput.value.trim();
      const password = passInput.value;

      if (!email || !password) {
        showError('กรุณากรอกอีเมลและรหัสผ่านให้ครบถ้วน');
        return;
      }

      setLoading(true);
      try {
        const res = await fetch(`${API_BASE}/users/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const payload = await res.json().catch(() => ({}));

        if (!res.ok || payload.status !== 'success') {
          const msg = payload.message || `เข้าสู่ระบบไม่สำเร็จ (HTTP ${res.status})`;
          showError(msg);
          return;
        }

        const token = payload.data && payload.data.token;
        if (!token) {
          showError('ไม่พบ token ในคำตอบจากเซิร์ฟเวอร์');
          return;
        }

        localStorage.setItem('token', token);
        window.location.href = '../kanban_board_dashboard/code.html';
      } catch (err) {
        console.error('Login request failed:', err);
        showError('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาตรวจสอบว่า backend กำลังทำงานอยู่ที่ http://localhost:3000');
      } finally {
        setLoading(false);
      }
    });
  })();
</script>
