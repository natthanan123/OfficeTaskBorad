<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            border: 1px solid rgba(199, 196, 216, 0.2);
        }

        input::-ms-reveal,
        input::-ms-clear {

        }

        /* ซ่อนปุ่มตาแบบ Default ของ WebKit (Chrome, Safari, บราวเซอร์อื่นๆ) */

        input::-webkit-credentials-auto-fill-button {
            visibility: hidden;
            display: none !important;
            pointer-events: none;
            height: 0;

            margin: 0;
        }

<body class="bg-surface-container-lowest min-h-screen flex flex-col antialiased">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Branding Anchor -->
<div class="mb-10 text-center">
<img alt="Pawtry Logo" class="h-14 w-auto mx-auto mb-6" src="../assets/pawtry.png"/>
<h1 class="text-on-surface text-2xl font-extrabold tracking-tight mb-3">Create New Password</h1>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-[320px] mx-auto">
                    Your new password must be different from previously used passwords.
                </p>
</div>
<!-- Form Container (The Focused Task Card) -->
<div class="w-full bg-surface-container-lowest rounded-xl p-2">
<form id="reset-form" class="space-y-5">
<!-- Input Field 1 -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input id="new-password" class="w-full bg-surface-container-lowest ghost-border rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/60 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-200 shadow-sm" placeholder="New Password" type="password"/>
<button type="button" class="pw-toggle absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer" data-target="new-password">
<span class="material-symbols-outlined text-outline/60 hover:text-primary transition-colors text-[20px]">visibility</span>
</button>
</div>
<!-- Input Field 2 -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input id="confirm-password" class="w-full bg-surface-container-lowest ghost-border rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/60 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all duration-200 shadow-sm" placeholder="Confirm New Password" type="password"/>
<button type="button" class="pw-toggle absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer" data-target="confirm-password">
<span class="material-symbols-outlined text-outline/60 hover:text-primary transition-colors text-[20px]">visibility</span>
</button>
</div>
<!-- Submit Button -->
<button id="submit-btn" class="w-full bg-primary-container text-on-primary font-semibold py-4 rounded-xl shadow-lg shadow-primary-container/20 hover:opacity-90 active:scale-[0.98] transition-all duration-150 mt-2" type="submit">
                        Reset Password
                    </button>
</form>
</div>
<!-- Footer Action -->
<div class="mt-10">
<a class="text-on-surface-variant text-sm font-medium hover:text-on-surface transition-colors group" href="../login_page_with_pawtry_logo/code.html">
                    Back to <span class="text-primary-container font-bold underline underline-offset-4 group-hover:text-primary">Login</span>
</a>
</div>
</div>
</main>
<!-- Shared Footer -->
<footer class="w-full max-w-7xl mx-auto py-8 px-8 flex flex-col md:flex-row justify-between items-center border-t border-[#c7c4d8]/20 bg-[#f8f9fa] dark:bg-slate-950">
<div class="mb-4 md:mb-0">
<span class="text-sm font-['Inter'] text-[#191c1d]/60">© 2024 Pawtry. All rights reserved.</span>
</div>
<div class="flex space-x-6">
<a class="text-sm font-['Inter'] text-[#191c1d]/60 hover:text-[#3525cd] transition-colors" href="#">Privacy Policy</a>
<a class="text-sm font-['Inter'] text-[#191c1d]/60 hover:text-[#3525cd] transition-colors" href="#">Terms of Service</a>
<a class="text-sm font-['Inter'] text-[#191c1d]/60 hover:text-[#3525cd] transition-colors" href="#">Help Center</a>
</div>
</footer>
<script>
(function () {
  const API_BASE   = 'http://192.168.1.197:3000/api';
  const LOGIN_PAGE = '../login_page_with_pawtry_logo/code.html';

  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    alert('Invalid or missing token');
    window.location.replace(LOGIN_PAGE);
    return;
  }

  const form      = document.getElementById('reset-form');
  const newPw     = document.getElementById('new-password');
  const confirmPw = document.getElementById('confirm-password');
  const submitBtn = document.getElementById('submit-btn');
  const btnText   = submitBtn.textContent.trim();

  document.querySelectorAll('.pw-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const icon  = btn.querySelector('.material-symbols-outlined');
      const show  = input.type === 'password';
      input.type     = show ? 'text' : 'password';
      icon.textContent = show ? 'visibility_off' : 'visibility';
    });
  });

  function setLoading(loading) {
    submitBtn.disabled = loading;
    submitBtn.innerHTML = loading
      ? '<span class="material-symbols-outlined animate-spin text-base" style="font-variation-settings:\'FILL\' 0,\'wght\' 400,\'GRAD\' 0,\'opsz\' 24">progress_activity</span> Resetting...'
      : btnText;
    submitBtn.style.opacity = loading ? '0.7' : '1';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const password = newPw.value;
    const confirm  = confirmPw.value;

    if (!password || !confirm) {
      alert('กรุณากรอกรหัสผ่านให้ครบทั้งสองช่อง');
      return;
    }

    if (password.length < 6) {
      alert('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');
      newPw.focus();
      return;
    }

    if (password !== confirm) {
      alert('รหัสผ่านไม่ตรงกัน กรุณากรอกใหม่');
      confirmPw.focus();
      return;
    }

    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/users/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: password }),
      });

      const payload = await res.json().catch(() => ({}));

      if (!res.ok || payload.status !== 'success') {
        alert(payload.message || `เกิดข้อผิดพลาด (HTTP ${res.status})`);
        return;
      }

      alert('Password reset successfully!');
      window.location.href = LOGIN_PAGE;
    } catch (err) {
      console.error('Reset password request failed:', err);
      alert('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาตรวจสอบว่า backend กำลังทำงานอยู่');
    } finally {
      setLoading(false);
    }
  });
})();
</script>
</body></html>
