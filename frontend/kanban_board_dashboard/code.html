<!-- ─── Kanban Board API wiring ─── -->
<script>
  (function () {
    const API_BASE   = 'http://localhost:3000/api';
    const LOGIN_PAGE = '../login_page_with_pawtry_logo/code.html';

    // ── 1. Authorization guard ──
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.replace(LOGIN_PAGE);
      return;
    }

    const boardTitleEl = document.getElementById('board-title');
    const columnsEl    = document.getElementById('kanban-columns');
    const userNameEl   = document.getElementById('user-name');
    const userMenuBtn  = document.getElementById('user-menu');

    // ── Helper: authed fetch ──
    async function api(path) {
      const res = await fetch(`${API_BASE}${path}`, {
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
      });
      if (res.status === 401) {
        // Token expired or invalid → kick back to login
        localStorage.removeItem('token');
        window.location.replace(LOGIN_PAGE);
        throw new Error('Unauthorized');
      }
      const payload = await res.json().catch(() => ({}));
      if (!res.ok || payload.status !== 'success') {
        throw new Error(payload.message || `Request failed (HTTP ${res.status})`);
      }
      return payload.data;
    }

    // ── Helper: HTML escape (prevents XSS from user-entered titles) ──
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ── Helper: format date as "MMM DD" (e.g. "Apr 09") ──
    function formatDueDate(isoDate) {
      if (!isoDate) return '';
      const d = new Date(isoDate);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-US', { month: 'short', day: '2-digit' });
    }

    // ── Helper: get initials from full name ──
    function initials(name) {
      if (!name) return '?';
      return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    }

    // ── Helper: deterministic color from a string (for assignee avatars) ──
    function colorFor(str) {
      const palette = ['#3525cd', '#58579b', '#7e3000', '#a44100', '#4f46e5', '#454386'];
      let hash = 0;
      for (let i = 0; i < (str || '').length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
      return palette[hash % palette.length];
    }

    // ── Render a single task card ──
    function renderTaskCard(task) {
      const assignees = Array.isArray(task.assignees) ? task.assignees : [];
      const visibleAssignees = assignees.slice(0, 3);
      const overflow = assignees.length - visibleAssignees.length;

      const assigneeAvatars = visibleAssignees.map(u => `
        <div class="w-6 h-6 rounded-full border border-surface flex items-center justify-center text-[9px] font-bold text-white"
             style="background-color: ${colorFor(u.email || u.id || u.full_name)};"
             title="${escapeHtml(u.full_name || u.email)}">
          ${escapeHtml(initials(u.full_name))}
        </div>
      `).join('');

      const overflowBadge = overflow > 0
        ? `<div class="w-6 h-6 rounded-full bg-primary-fixed flex items-center justify-center text-[10px] font-bold text-on-primary-fixed border border-surface">+${overflow}</div>`
        : '';

      const dueLabel = formatDueDate(task.due_date);
      const dueBlock = dueLabel
        ? `<div class="flex items-center space-x-1 text-slate-400">
             <span class="material-symbols-outlined text-xs">calendar_today</span>
             <span class="text-[10px] font-medium uppercase">${escapeHtml(dueLabel)}</span>
           </div>`
        : '';

      const descBlock = task.description
        ? `<p class="text-xs text-on-surface-variant mb-3 line-clamp-2">${escapeHtml(task.description)}</p>`
        : '';

      return `
        <div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.06)] border border-transparent hover:border-primary/20 transition-all cursor-pointer"
             data-task-id="${escapeHtml(task.id)}">
          <h4 class="font-bold text-on-surface leading-tight mb-2">${escapeHtml(task.title)}</h4>
          ${descBlock}
          <div class="flex justify-between items-center mt-3">
            <div class="flex -space-x-1">${assigneeAvatars}${overflowBadge}</div>
            ${dueBlock}
          </div>
        </div>
      `;
    }

    // ── Render a single column ──
    function renderColumn(column) {
      const tasks = Array.isArray(column.tasks) ? [...column.tasks] : [];
      tasks.sort((a, b) => (a.position ?? 0) - (b.position ?? 0));
      const cardsHtml = tasks.length
        ? tasks.map(renderTaskCard).join('')
        : `<p class="text-xs text-on-surface-variant/50 italic text-center py-4">No tasks yet</p>`;

      return `
        <div class="kanban-column flex flex-col h-full bg-surface-container-low rounded-xl p-3" data-column-id="${escapeHtml(column.id)}">
          <div class="flex justify-between items-center px-2 py-3 mb-2">
            <div class="flex items-center space-x-2">
              <h3 class="font-bold text-on-surface-variant tracking-tight">${escapeHtml(column.title)}</h3>
              <span class="bg-surface-container-highest px-2 py-0.5 rounded-full text-[10px] font-bold text-on-surface-variant">${tasks.length}</span>
            </div>
            <button class="text-on-surface-variant/50 hover:text-primary"><span class="material-symbols-outlined">more_horiz</span></button>
          </div>
          <div class="space-y-4 flex-1 overflow-y-auto pr-1">
            ${cardsHtml}
          </div>
        </div>
      `;
    }

    // ── Render the entire board ──
    function renderBoard(board) {
      boardTitleEl.textContent = board.title || 'Untitled Board';
      document.title = `${board.title || 'Board'} | Pawtry`;

      const columns = Array.isArray(board.columns) ? [...board.columns] : [];
      columns.sort((a, b) => (a.position ?? 0) - (b.position ?? 0));

      if (columns.length === 0) {
        columnsEl.innerHTML = `
          <div class="flex-1 flex items-center justify-center text-on-surface-variant">
            <div class="flex flex-col items-center gap-2">
              <span class="material-symbols-outlined text-[32px] text-outline">view_kanban</span>
              <p class="text-sm font-medium">This board has no columns yet.</p>
            </div>
          </div>
        `;
        return;
      }

      columnsEl.innerHTML = columns.map(renderColumn).join('');
    }

    // ── Render error state ──
    function renderError(message) {
      boardTitleEl.textContent = 'Could not load board';
      columnsEl.innerHTML = `
        <div class="flex-1 flex items-center justify-center">
          <div class="flex flex-col items-center gap-3 max-w-md text-center">
            <span class="material-symbols-outlined text-error text-[40px]">error</span>
            <p class="text-sm font-semibold text-on-surface">${escapeHtml(message)}</p>
            <p class="text-xs text-on-surface-variant">ตรวจสอบว่า backend กำลังทำงานอยู่ที่ http://localhost:3000 และมี board ในฐานข้อมูล</p>
          </div>
        </div>
      `;
    }

    // ── 2 + 3. Fetch boards → fetch first board details → render ──
    async function loadBoard() {
      try {
        // Show profile name in parallel (non-blocking)
        api('/users/me').then(d => {
          if (d && d.user) userNameEl.textContent = d.user.full_name || d.user.email;
        }).catch(() => { /* ignore */ });

        const list = await api('/boards');
        const boards = (list && list.boards) || [];
        if (boards.length === 0) {
          boardTitleEl.textContent = 'No boards yet';
          columnsEl.innerHTML = `
            <div class="flex-1 flex items-center justify-center text-on-surface-variant">
              <div class="flex flex-col items-center gap-2">
                <span class="material-symbols-outlined text-[32px] text-outline">dashboard_customize</span>
                <p class="text-sm font-medium">ยังไม่มี board ในฐานข้อมูล</p>
              </div>
            </div>
          `;
          return;
        }

        const firstBoardId = boards[0].id;
        const detail = await api(`/boards/${firstBoardId}`);
        renderBoard(detail.board);
      } catch (err) {
        if (err.message === 'Unauthorized') return;
        console.error('Failed to load board:', err);
        renderError(err.message || 'Unknown error');
      }
    }

    // ── 4. Logout ──
    userMenuBtn.addEventListener('click', () => {
      if (confirm('Logout from Pawtry?')) {
        localStorage.removeItem('token');
        window.location.replace(LOGIN_PAGE);
      }
    });

    loadBoard();
  })();
</script>
