<!-- ─── Kanban Board API wiring ─── -->
<script>
  (function () {
    const API_BASE   = 'http://localhost:3000/api';
    const LOGIN_PAGE = '../login_page_with_pawtry_logo/code.html';

    // ── 1. Authorization guard ──
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.replace(LOGIN_PAGE);
      return;
    }

    const boardTitleEl = document.getElementById('board-title');
    const columnsEl    = document.getElementById('kanban-columns');
    const userNameEl   = document.getElementById('user-name');
    const userMenuBtn  = document.getElementById('user-menu');
    const boardListEl  = document.getElementById('board-list-container');
    const newBoardBtn  = document.getElementById('new-board-btn');

    // ── Task data cache (for modal) ──
    const taskCache = new Map();

    // ── Boards state ──
    let activeBoardId = null;
    let cachedBoards  = [];

    // ── Helper: authed fetch ──
    async function api(path, { method = 'GET', body } = {}) {
      const opts = {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
      };
      if (body) opts.body = JSON.stringify(body);

      const res = await fetch(`${API_BASE}${path}`, opts);
      if (res.status === 401) {
        localStorage.removeItem('token');
        window.location.replace(LOGIN_PAGE);
        throw new Error('Unauthorized');
      }
      const payload = await res.json().catch(() => ({}));
      if (!res.ok || payload.status !== 'success') {
        throw new Error(payload.message || `Request failed (HTTP ${res.status})`);
      }
      return payload.data;
    }

    // ── Helper: HTML escape (prevents XSS from user-entered titles) ──
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ── Helper: format date as "MMM DD" (e.g. "Apr 09") ──
    function formatDueDate(isoDate) {
      if (!isoDate) return '';
      const d = new Date(isoDate);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-US', { month: 'short', day: '2-digit' });
    }

    // ── Helper: get initials from full name ──
    function initials(name) {
      if (!name) return '?';
      return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    }

    // ── Helper: deterministic color from a string (for assignee avatars) ──
    function colorFor(str) {
      const palette = ['#3525cd', '#58579b', '#7e3000', '#a44100', '#4f46e5', '#454386'];
      let hash = 0;
      for (let i = 0; i < (str || '').length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
      return palette[hash % palette.length];
    }

    // ── Render a single task card ──
    function renderTaskCard(task) {
      const assignees = Array.isArray(task.assignees) ? task.assignees : [];
      const visibleAssignees = assignees.slice(0, 3);
      const overflow = assignees.length - visibleAssignees.length;

      const assigneeAvatars = visibleAssignees.map(u => `
        <div class="w-6 h-6 rounded-full border border-surface flex items-center justify-center text-[9px] font-bold text-white"
             style="background-color: ${colorFor(u.email || u.id || u.full_name)};"
             title="${escapeHtml(u.full_name || u.email)}">
          ${escapeHtml(initials(u.full_name))}
        </div>
      `).join('');

      const overflowBadge = overflow > 0
        ? `<div class="w-6 h-6 rounded-full bg-primary-fixed flex items-center justify-center text-[10px] font-bold text-on-primary-fixed border border-surface">+${overflow}</div>`
        : '';

      const dueLabel = formatDueDate(task.due_date);
      const dueBlock = dueLabel
        ? `<div class="flex items-center space-x-1 text-slate-400">
             <span class="material-symbols-outlined text-xs">calendar_today</span>
             <span class="text-[10px] font-medium uppercase">${escapeHtml(dueLabel)}</span>
           </div>`
        : '';

      const descBlock = task.description
        ? `<p class="text-xs text-on-surface-variant mb-3 line-clamp-2">${escapeHtml(task.description)}</p>`
        : '';

      return `
        <div class="task-card bg-surface-container-lowest p-4 rounded-xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.06)] border border-transparent hover:border-primary/20 transition-all cursor-grab active:cursor-grabbing"
             draggable="true"
             data-task-id="${escapeHtml(task.id)}"
             data-column-id="${escapeHtml(task.column_id)}">
          <h4 class="font-bold text-on-surface leading-tight mb-2">${escapeHtml(task.title)}</h4>
          ${descBlock}
          <div class="flex justify-between items-center mt-3">
            <div class="flex -space-x-1">${assigneeAvatars}${overflowBadge}</div>
            ${dueBlock}
          </div>
        </div>
      `;
    }

    // ── Render a single column ──
    function renderColumn(column) {
      const tasks = Array.isArray(column.tasks) ? [...column.tasks] : [];
      tasks.sort((a, b) => (a.position ?? 0) - (b.position ?? 0));
      const cardsHtml = tasks.length
        ? tasks.map(renderTaskCard).join('')
        : `<p class="text-xs text-on-surface-variant/50 italic text-center py-4">No tasks yet</p>`;

      return `
        <div class="kanban-column flex flex-col h-full bg-surface-container-low rounded-xl p-3" data-column-id="${escapeHtml(column.id)}">
          <div class="flex justify-between items-center px-2 py-3 mb-2">
            <div class="flex items-center space-x-2">
              <h3 class="font-bold text-on-surface-variant tracking-tight">${escapeHtml(column.title)}</h3>
              <span class="bg-surface-container-highest px-2 py-0.5 rounded-full text-[10px] font-bold text-on-surface-variant">${tasks.length}</span>
            </div>
            <button class="text-on-surface-variant/50 hover:text-primary"><span class="material-symbols-outlined">more_horiz</span></button>
          </div>
          <div class="kanban-drop-zone space-y-4 flex-1 overflow-y-auto pr-1 transition-all duration-150">
            ${cardsHtml}
          </div>
          <button class="add-task-btn mt-3 w-full py-2 text-sm text-on-surface-variant/50 hover:text-primary hover:bg-primary/5 rounded-lg transition-all flex items-center justify-center space-x-1 group"
                  data-column-id="${escapeHtml(column.id)}">
            <span class="material-symbols-outlined text-base group-hover:text-primary">add</span>
            <span>Add Task</span>
          </button>
        </div>
      `;
    }

    // ── Render the entire board ──
    function renderBoard(board) {
      boardTitleEl.textContent = board.title || 'Untitled Board';
      document.title = `${board.title || 'Board'} | Pawtry`;

      const columns = Array.isArray(board.columns) ? [...board.columns] : [];
      columns.sort((a, b) => (a.position ?? 0) - (b.position ?? 0));

      if (columns.length === 0) {
        columnsEl.innerHTML = `
          <div class="flex-1 flex items-center justify-center text-on-surface-variant">
            <div class="flex flex-col items-center gap-2">
              <span class="material-symbols-outlined text-[32px] text-outline">view_kanban</span>
              <p class="text-sm font-medium">This board has no columns yet.</p>
            </div>
          </div>
        `;
        return;
      }

      // Cache all tasks for modal lookup
      taskCache.clear();
      columns.forEach(col => {
        (col.tasks || []).forEach(t => taskCache.set(String(t.id), t));
      });

      columnsEl.innerHTML = columns.map(renderColumn).join('');
      setupDragAndDrop();
      attachCardClickEvents();
      attachAddTaskEvents();
    }

    // ── Helper: update task count badge in a column ──
    function updateColumnBadge(columnEl) {
      const dropZone = columnEl.querySelector('.kanban-drop-zone');
      const badge = columnEl.querySelector('.bg-surface-container-highest');
      if (!dropZone || !badge) return;
      const count = dropZone.querySelectorAll('.task-card').length;
      badge.textContent = count;
      // Show / hide empty placeholder
      const placeholder = dropZone.querySelector('.empty-placeholder');
      if (count === 0 && !placeholder) {
        const p = document.createElement('p');
        p.className = 'empty-placeholder text-xs text-on-surface-variant/50 italic text-center py-4';
        p.textContent = 'No tasks yet';
        dropZone.appendChild(p);
      } else if (count > 0 && placeholder) {
        placeholder.remove();
      }
    }

    // ── Task Detail Modal logic ──
    const modalEl        = document.getElementById('task-modal');
    const modalBackdrop  = document.getElementById('modal-backdrop');
    const modalCloseBtn  = document.getElementById('modal-close');
    const modalTitle     = document.getElementById('modal-title');
    const modalDesc      = document.getElementById('modal-desc');
    const modalDue       = document.getElementById('modal-due');
    const modalDueText   = document.getElementById('modal-due-text');
    const modalStatus    = document.getElementById('modal-status');
    const modalAssignees = document.getElementById('modal-assignees');
    const modalSaveBtn   = document.getElementById('modal-save');
    const modalDeleteBtn = document.getElementById('modal-delete');

    let activeTaskId  = null;
    let activeColumnId = null;
    let modalMode      = 'edit'; // 'edit' | 'create'

    // ── Shared: sections that hide in create mode ──
    const modalInfoRow      = modalDue.closest('.flex.gap-6');
    const modalAssigneesRow = modalAssignees.closest('div');

    function openTaskModal(taskId) {
      const task = taskCache.get(String(taskId));
      if (!task) return;

      modalMode      = 'edit';
      activeTaskId   = String(taskId);
      activeColumnId = task.column_id;

      // Populate editable fields
      modalTitle.value = task.title || '';
      modalDesc.value  = task.description || '';

      // Due date
      const due = formatDueDate(task.due_date);
      if (due) {
        modalDueText.textContent = due;
        modalDue.classList.remove('hidden');
      } else {
        modalDue.classList.add('hidden');
      }

      // Column name as status
      const colEl = columnsEl.querySelector(`.kanban-column[data-column-id="${task.column_id}"]`);
      const colTitle = colEl ? colEl.querySelector('h3') : null;
      modalStatus.textContent = colTitle ? colTitle.textContent : '—';

      // Assignees
      const assignees = Array.isArray(task.assignees) ? task.assignees : [];
      modalAssignees.innerHTML = assignees.length
        ? assignees.map(u => `
            <span class="inline-flex items-center gap-1.5 bg-surface-container-high px-2.5 py-1 rounded-full text-xs font-medium text-on-surface-variant">
              <span class="w-5 h-5 rounded-full flex items-center justify-center text-[9px] font-bold text-white" style="background:${colorFor(u.email || u.id || u.full_name)}">${escapeHtml(initials(u.full_name))}</span>
              ${escapeHtml(u.full_name || u.email)}
            </span>
          `).join('')
        : '<span class="text-xs text-on-surface-variant/50 italic">No assignees</span>';

      // Show edit-only sections
      modalInfoRow.classList.remove('hidden');
      modalAssigneesRow.classList.remove('hidden');
      modalDeleteBtn.classList.remove('hidden');
      modalSaveBtn.innerHTML = '<span class="material-symbols-outlined text-base">save</span> Save Changes';

      // Reset button states
      modalSaveBtn.disabled = false;
      modalDeleteBtn.disabled = false;

      modalEl.classList.remove('hidden');
    }

    function openCreateModal(columnId) {
      modalMode      = 'create';
      activeTaskId   = null;
      activeColumnId = columnId;

      // Clear form
      modalTitle.value = '';
      modalDesc.value  = '';

      // Hide edit-only sections
      modalInfoRow.classList.add('hidden');
      modalAssigneesRow.classList.add('hidden');
      modalDeleteBtn.classList.add('hidden');
      modalSaveBtn.innerHTML = '<span class="material-symbols-outlined text-base">add_task</span> Create Task';

      // Reset button state
      modalSaveBtn.disabled = false;

      modalEl.classList.remove('hidden');
      modalTitle.focus();
    }

    function closeTaskModal() {
      modalEl.classList.add('hidden');
      activeTaskId = null;
    }

    modalCloseBtn.addEventListener('click', closeTaskModal);
    modalBackdrop.addEventListener('click', closeTaskModal);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeTaskModal();
    });

    // ── Save / Create handler ──
    modalSaveBtn.addEventListener('click', async () => {
      const newTitle = modalTitle.value.trim();
      const newDesc  = modalDesc.value.trim();

      if (!newTitle) {
        alert('Title is required');
        modalTitle.focus();
        return;
      }

      modalSaveBtn.disabled = true;
      modalSaveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-base">progress_activity</span> Saving...';

      try {
        if (modalMode === 'create') {
          // ── CREATE: POST new task ──
          const data = await api('/tasks', {
            method: 'POST',
            body: { column_id: activeColumnId, title: newTitle, description: newDesc },
          });

          const task = data.task;

          // Cache the new task
          taskCache.set(String(task.id), task);

          // ── Optimistic UI: insert card into column ──
          const colEl   = columnsEl.querySelector(`.kanban-column[data-column-id="${activeColumnId}"]`);
          if (colEl) {
            const dropZone = colEl.querySelector('.kanban-drop-zone');

            // Remove "No tasks yet" placeholder
            const placeholder = dropZone.querySelector('.empty-placeholder, p.italic');
            if (placeholder) placeholder.remove();

            // Build and insert card
            const wrapper = document.createElement('div');
            wrapper.innerHTML = renderTaskCard(task);
            const cardEl = wrapper.firstElementChild;
            dropZone.appendChild(cardEl);

            // Bind events on the new card
            attachSingleCardEvents(cardEl);
            attachSingleCardDrag(cardEl);

            updateColumnBadge(colEl);
          }

        } else {
          // ── EDIT: PUT existing task ──
          if (!activeTaskId) return;

          await api(`/tasks/${activeTaskId}`, {
            method: 'PUT',
            body: { title: newTitle, description: newDesc },
          });

          // ── Optimistic UI: update the card in the board ──
          const card = columnsEl.querySelector(`.task-card[data-task-id="${activeTaskId}"]`);
          if (card) {
            const h4 = card.querySelector('h4');
            if (h4) h4.textContent = newTitle;

            const descP = card.querySelector('p.text-xs.text-on-surface-variant');
            if (newDesc) {
              if (descP) {
                descP.textContent = newDesc;
              } else {
                const newP = document.createElement('p');
                newP.className = 'text-xs text-on-surface-variant mb-3 line-clamp-2';
                newP.textContent = newDesc;
                h4.insertAdjacentElement('afterend', newP);
              }
            } else if (descP) {
              descP.remove();
            }
          }

          // Update cache
          const cached = taskCache.get(activeTaskId);
          if (cached) {
            cached.title = newTitle;
            cached.description = newDesc;
          }
        }

        closeTaskModal();
      } catch (err) {
        console.error('Failed to save task:', err);
        alert((modalMode === 'create' ? 'Create' : 'Update') + ' failed: ' + (err.message || 'Unknown error'));
      } finally {
        modalSaveBtn.disabled = false;
        modalSaveBtn.innerHTML = modalMode === 'create'
          ? '<span class="material-symbols-outlined text-base">add_task</span> Create Task'
          : '<span class="material-symbols-outlined text-base">save</span> Save Changes';
      }
    });

    // ── Delete Task ──
    modalDeleteBtn.addEventListener('click', async () => {
      if (!activeTaskId) return;
      if (!confirm('Are you sure you want to delete this task?')) return;

      modalDeleteBtn.disabled = true;
      modalDeleteBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-base">progress_activity</span>';

      try {
        await api(`/tasks/${activeTaskId}`, { method: 'DELETE' });

        // ── Optimistic UI: remove card from DOM ──
        const card = columnsEl.querySelector(`.task-card[data-task-id="${activeTaskId}"]`);
        if (card) {
          const columnEl = card.closest('.kanban-column');
          card.remove();
          if (columnEl) updateColumnBadge(columnEl);
        }

        // Remove from cache
        taskCache.delete(activeTaskId);

        closeTaskModal();
      } catch (err) {
        console.error('Failed to delete task:', err);
        alert('Delete failed: ' + (err.message || 'Unknown error'));
      } finally {
        modalDeleteBtn.disabled = false;
        modalDeleteBtn.innerHTML = '<span class="material-symbols-outlined text-base">delete</span> Delete';
      }
    });

    // ── Bind click (modal open) on a single card element ──
    function attachSingleCardEvents(card) {
      let didDrag = false;

      card.addEventListener('dragstart', () => { didDrag = true; });
      card.addEventListener('dragend',   () => {
        setTimeout(() => { didDrag = false; }, 0);
      });

      card.addEventListener('click', (e) => {
        if (didDrag) return;
        if (e.target.closest('button, a, input, textarea, select')) return;
        openTaskModal(card.dataset.taskId);
      });
    }

    // ── Bind drag events on a single card element ──
    function attachSingleCardDrag(card) {
      card.addEventListener('dragstart', (e) => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', JSON.stringify({
          taskId: card.dataset.taskId,
          sourceColumnId: card.dataset.columnId,
        }));
        requestAnimationFrame(() => card.classList.add('task-card-dragging'));
      });

      card.addEventListener('dragend', () => {
        card.classList.remove('task-card-dragging');
        columnsEl.querySelectorAll('.column-drag-over').forEach(c => c.classList.remove('column-drag-over'));
      });
    }

    // ── Attach click events to all task cards (click vs drag aware) ──
    function attachCardClickEvents() {
      columnsEl.querySelectorAll('.task-card').forEach(card => {
        attachSingleCardEvents(card);
      });
    }

    // ── Attach click events to all "+ Add Task" buttons ──
    function attachAddTaskEvents() {
      columnsEl.querySelectorAll('.add-task-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          openCreateModal(btn.dataset.columnId);
        });
      });
    }

    // ── Setup Drag & Drop on all rendered columns ──
    function setupDragAndDrop() {
      // --- Draggable cards ---
      columnsEl.querySelectorAll('.task-card').forEach(card => {
        card.addEventListener('dragstart', (e) => {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', JSON.stringify({
            taskId: card.dataset.taskId,
            sourceColumnId: card.dataset.columnId,
          }));
          requestAnimationFrame(() => card.classList.add('task-card-dragging'));
        });

        card.addEventListener('dragend', () => {
          card.classList.remove('task-card-dragging');
          // Clean up any lingering column highlights
          columnsEl.querySelectorAll('.column-drag-over').forEach(c => c.classList.remove('column-drag-over'));
        });
      });

      // --- Drop zones (columns) ---
      columnsEl.querySelectorAll('.kanban-column').forEach(colEl => {
        const dropZone = colEl.querySelector('.kanban-drop-zone');
        if (!dropZone) return;

        colEl.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          colEl.classList.add('column-drag-over');
        });

        colEl.addEventListener('dragleave', (e) => {
          // Only remove highlight when truly leaving the column (not entering a child)
          if (!colEl.contains(e.relatedTarget)) {
            colEl.classList.remove('column-drag-over');
          }
        });

        colEl.addEventListener('drop', async (e) => {
          e.preventDefault();
          colEl.classList.remove('column-drag-over');

          let data;
          try { data = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
          const { taskId, sourceColumnId } = data;
          const targetColumnId = colEl.dataset.columnId;

          // Same column → do nothing
          if (String(sourceColumnId) === String(targetColumnId)) return;

          const card = columnsEl.querySelector(`.task-card[data-task-id="${taskId}"]`);
          if (!card) return;

          // ── Optimistic UI update ──
          // Remove empty placeholder from target if present
          const targetPlaceholder = dropZone.querySelector('.empty-placeholder');
          if (targetPlaceholder) targetPlaceholder.remove();

          // Move DOM element
          card.dataset.columnId = targetColumnId;
          dropZone.appendChild(card);

          // Update badges on both columns
          const sourceColEl = columnsEl.querySelector(`.kanban-column[data-column-id="${sourceColumnId}"]`);
          if (sourceColEl) updateColumnBadge(sourceColEl);
          updateColumnBadge(colEl);

          // ── Persist to backend ──
          try {
            await api(`/tasks/${taskId}`, {
              method: 'PUT',
              body: { column_id: targetColumnId },
            });
          } catch (err) {
            console.error('Failed to move task:', err);
            alert('ย้าย Task ไม่สำเร็จ: ' + (err.message || 'Unknown error') + '\nจะโหลดบอร์ดใหม่เพื่อให้ตรงกับฐานข้อมูล');
            loadBoardData(activeBoardId);
          }
        });
      });
    }

    // ── Render error state ──
    function renderError(message) {
      boardTitleEl.textContent = 'Could not load board';
      columnsEl.innerHTML = `
        <div class="flex-1 flex items-center justify-center">
          <div class="flex flex-col items-center gap-3 max-w-md text-center">
            <span class="material-symbols-outlined text-error text-[40px]">error</span>
            <p class="text-sm font-semibold text-on-surface">${escapeHtml(message)}</p>
            <p class="text-xs text-on-surface-variant">ตรวจสอบว่า backend กำลังทำงานอยู่ที่ http://localhost:3000 และมี board ในฐานข้อมูล</p>
          </div>
        </div>
      `;
    }

    // ── Render the sidebar board list from cachedBoards ──
    function renderBoardList() {
      if (!cachedBoards.length) {
        boardListEl.innerHTML = `
          <li class="px-3 py-2 text-xs text-slate-400 dark:text-slate-500 italic">
            No boards yet. Click "New Board" to create one.
          </li>
        `;
        return;
      }

      boardListEl.innerHTML = cachedBoards.map(b => {
        const isActive = String(b.id) === String(activeBoardId);
        const stateClasses = isActive
          ? 'bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-300 font-semibold border-r-2 border-indigo-600'
          : 'text-slate-500 dark:text-slate-400 hover:text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20';
        return `
          <li>
            <button type="button"
                    class="board-list-item w-full flex items-center space-x-3 px-3 py-2 rounded-lg text-sm transition-colors text-left ${stateClasses}"
                    data-board-id="${escapeHtml(b.id)}"
                    title="${escapeHtml(b.title || 'Untitled')}">
              <span class="material-symbols-outlined text-base shrink-0">view_kanban</span>
              <span class="truncate flex-1">${escapeHtml(b.title || 'Untitled')}</span>
            </button>
          </li>
        `;
      }).join('');

      // Wire click → switch board
      boardListEl.querySelectorAll('.board-list-item').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.boardId;
          if (!id || id === activeBoardId) return;
          activeBoardId = id;
          renderBoardList();         // refresh active highlight
          loadBoardData(activeBoardId);
        });
      });
    }

    // ── Fetch the user's boards and re-render the sidebar ──
    async function loadBoards() {
      try {
        const data = await api('/boards');
        cachedBoards = (data && data.boards) || [];
        renderBoardList();
        return cachedBoards;
      } catch (err) {
        if (err.message === 'Unauthorized') return [];
        console.error('Failed to load boards:', err);
        boardListEl.innerHTML = `
          <li class="px-3 py-2 text-xs text-error italic">Could not load boards</li>
        `;
        return [];
      }
    }

    // ── Fetch a single board's details and render its columns/tasks ──
    async function loadBoardData(boardId) {
      if (!boardId) return;
      try {
        // Loading state in the canvas
        columnsEl.innerHTML = `
          <div class="flex-1 flex items-center justify-center text-on-surface-variant">
            <div class="flex flex-col items-center gap-3">
              <span class="material-symbols-outlined text-primary animate-spin text-[32px]">progress_activity</span>
              <p class="text-sm font-medium">Loading board...</p>
            </div>
          </div>
        `;
        const detail = await api(`/boards/${boardId}`);
        renderBoard(detail.board);
      } catch (err) {
        if (err.message === 'Unauthorized') return;
        console.error('Failed to load board data:', err);
        renderError(err.message || 'Unknown error');
      }
    }

    // ── Page bootstrap: profile + board list + initial board render ──
    async function bootstrapDashboard() {
      // Profile name (non-blocking)
      api('/users/me').then(d => {
        if (d && d.user) userNameEl.textContent = d.user.full_name || d.user.email;
      }).catch(() => { /* ignore */ });

      await loadBoards();

      if (cachedBoards.length === 0) {
        boardTitleEl.textContent = 'No boards yet';
        columnsEl.innerHTML = `
          <div class="flex-1 flex items-center justify-center text-on-surface-variant">
            <div class="flex flex-col items-center gap-2">
              <span class="material-symbols-outlined text-[32px] text-outline">dashboard_customize</span>
              <p class="text-sm font-medium">No boards yet. Click "New Board" to create one.</p>
            </div>
          </div>
        `;
        return;
      }

      // Auto-select the most recent board on first load
      activeBoardId = cachedBoards[0].id;
      renderBoardList();
      await loadBoardData(activeBoardId);
    }

    // ── New Board button: prompt → POST /api/boards → refresh & switch ──
    newBoardBtn.addEventListener('click', async () => {
      const raw = prompt('Enter new board title:');
      if (raw === null) return; // user cancelled
      const title = raw.trim();
      if (!title) {
        alert('Board title cannot be empty');
        return;
      }

      newBoardBtn.disabled = true;
      try {
        const data = await api('/boards', { method: 'POST', body: { title } });
        const newBoard = data && data.board;
        if (!newBoard) throw new Error('Server did not return the new board');

        // Switch to the new board immediately
        activeBoardId = newBoard.id;
        await loadBoards();              // refresh sidebar list (highlights active)
        await loadBoardData(newBoard.id); // render its (empty) canvas
      } catch (err) {
        if (err.message === 'Unauthorized') return;
        console.error('Failed to create board:', err);
        alert('Could not create board: ' + (err.message || 'Unknown error'));
      } finally {
        newBoardBtn.disabled = false;
      }
    });

    // ── 4. Logout ──
    userMenuBtn.addEventListener('click', () => {
      if (confirm('Logout from Pawtry?')) {
        localStorage.removeItem('token');
        window.location.replace(LOGIN_PAGE);
      }
    });

    // ── 5. Drag-to-Scroll (Pan) on the board background ──
    // Pans the kanban columns horizontally when the user click-drags on
    // empty board space. Coexists with HTML5 card drag-and-drop because
    // it bails out the moment the press starts on a card or interactive
    // element — those keep their original behavior untouched.
    (function setupBoardPan() {
      const PAN_THRESHOLD = 5; // px before a press is treated as a pan
      const INTERACTIVE_SELECTOR = '.task-card, button, a, input, textarea, select, [draggable="true"]';

      let pointerDown    = false;
      let isPanning      = false;
      let startPageX     = 0;
      let startScrollLeft = 0;

      columnsEl.addEventListener('mousedown', (e) => {
        // Primary mouse button only
        if (e.button !== 0) return;
        // Never hijack a press on a card or any interactive control
        if (e.target.closest(INTERACTIVE_SELECTOR)) return;

        pointerDown     = true;
        isPanning       = false;
        startPageX      = e.pageX;
        startScrollLeft = columnsEl.scrollLeft;
      });

      columnsEl.addEventListener('mousemove', (e) => {
        if (!pointerDown) return;

        const dx = e.pageX - startPageX;

        // Defer committing to a pan until movement clears the threshold,
        // so a stationary click on the background still behaves normally.
        if (!isPanning) {
          if (Math.abs(dx) < PAN_THRESHOLD) return;
          isPanning = true;
          columnsEl.classList.add('is-panning');
        }

        e.preventDefault(); // suppress text selection while panning
        columnsEl.scrollLeft = startScrollLeft - dx;
      });

      function endPan() {
        if (!pointerDown) return;
        pointerDown = false;
        if (isPanning) {
          isPanning = false;
          columnsEl.classList.remove('is-panning');
        }
      }

      columnsEl.addEventListener('mouseup',    endPan);
      columnsEl.addEventListener('mouseleave', endPan);
    })();

    bootstrapDashboard();
  })();
</script>
</body></html>
