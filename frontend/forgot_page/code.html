<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;

<body class="bg-[#FFFFFF] text-on-surface antialiased min-h-screen flex items-center justify-center p-6">
<main class="w-full max-w-md flex flex-col items-center">
<!-- Brand Logo -->
<div class="mb-10">
<img alt="Pawtry Logo" class="h-12 w-auto" src="../assets/pawtry.png"/>
</div>
<!-- Focused Content Card -->
<div class="w-full bg-surface-container-lowest p-10 rounded-xl flex flex-col items-center">
<header class="text-center mb-8">
<h1 class="text-[2.75rem] font-extrabold tracking-tight text-on-surface leading-tight mb-3">Forgot Password?</h1>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-[280px] mx-auto">
                    Enter your registered email address below, and we'll send you a link to reset your password.
                </p>
</header>
<!-- Form Container -->
<form class="w-full space-y-6">
<!-- Input Group -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary text-on-surface placeholder:text-outline/60 transition-all shadow-sm" id="email" name="email" placeholder="Email Address" type="email"/>
</div>
<!-- Primary Action -->
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-on-primary font-semibold rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-2 shadow-lg shadow-primary/10" type="submit">
                    Send Reset Link
                </button>
</form>
<!-- Secondary Navigation -->
<footer class="mt-10 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    Remembered your password? 
                    <a class="text-primary hover:text-primary-container underline underline-offset-4 ml-1 transition-colors" href="../login_page_with_pawtry_logo/code.html">Login</a>
</p>
</footer>
</div>
<!-- Legal Micro-footer -->
<div class="mt-12 text-center">
<p class="text-[10px] uppercase tracking-widest text-outline/50 font-medium">
                © 2024 Pawtry Digital Curator. All rights reserved.
            </p>
</div>
</main>
<script>
(function () {
  const API_BASE   = window.APP_CONFIG.API_BASE;
  const LOGIN_PAGE = '../login_page_with_pawtry_logo/code.html';

  const form      = document.querySelector('form');
  const emailInput = document.getElementById('email');
  const submitBtn  = form.querySelector('button[type="submit"]');
  const btnText    = submitBtn.textContent.trim();

  function setLoading(loading) {
    submitBtn.disabled = loading;
    submitBtn.innerHTML = loading
      ? '<span class="material-symbols-outlined animate-spin text-base">progress_activity</span> Sending...'
      : btnText;
    submitBtn.style.opacity = loading ? '0.7' : '1';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = emailInput.value.trim();
    if (!email) {
      alert('กรุณากรอกอีเมล');
      emailInput.focus();
      return;
    }

    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/users/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });

      const payload = await res.json().catch(() => ({}));

      if (!res.ok || payload.status !== 'success') {
        alert(payload.message || `เกิดข้อผิดพลาด (HTTP ${res.status})`);
        return;
      }

      alert('Reset link sent to your email!');
      window.location.href = LOGIN_PAGE;
    } catch (err) {
      console.error('Forgot password request failed:', err);
      alert('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาตรวจสอบว่า backend กำลังทำงานอยู่');
    } finally {
      setLoading(false);
    }
  });
})();
</script>
</body></html>
