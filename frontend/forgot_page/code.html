<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#b6b4ff",

                        "on-tertiary-fixed-variant": "#7b2f00",

                        "primary-container": "#4f46e5",

                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#c3c0ff",
                        "on-primary-fixed": "#0f0069",
                        "surface-variant": "#e1e3e4",
                        "surface-dim": "#d9dadb",
                        "tertiary-fixed-dim": "#ffb695",
                        "surface-container": "#edeeef",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-primary-container": "#dad7ff",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c7c4d8",
                        "on-tertiary-container": "#ffd2be",
                        "background": "#ffffff",
                        "tertiary-fixed": "#ffdbcc",
                        "on-surface": "#191c1d",
                        "surface-container-highest": "#e1e3e4",
                        "error-container": "#ffdad6",
                        "surface": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e7e8e9",
                        "surface-bright": "#f8f9fa",
                        "tertiary-container": "#a44100",
                        "primary": "#3525cd",
                        "on-secondary-fixed-variant": "#413f82",
                        "inverse-on-surface": "#f0f1f2",
                        "on-background": "#191c1d",
                        "surface-tint": "#4d44e3",
                        "surface-container-low": "#f3f4f5",
                        "tertiary": "#7e3000",
                        "on-secondary-fixed": "#140f54",
                        "on-primary": "#ffffff",
                        "secondary": "#58579b",
                        "primary-fixed": "#e2dfff",
                        "secondary-fixed": "#e2dfff",
                        "inverse-primary": "#c3c0ff",
                        "error": "#ba1a1a",
                        "outline": "#777587"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-[#FFFFFF] text-on-surface antialiased min-h-screen flex items-center justify-center p-6">
<!-- Auth Shell Suppression: No TopNavBar or SideNavBar for Forgot Password Flow -->
<main class="w-full max-w-md flex flex-col items-center">
<!-- Brand Logo -->
<div class="mb-10">
<img alt="Pawtry Logo" class="h-12 w-auto" data-alt="minimalist and elegant logo for a premium pet care brand featuring a stylized paw or bone element in indigo tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKAdoDSFTOZGk758oYC4Tt5TAoD8KIHw-uhc3P9ktQMd8O9QSGnbiI5gzlE2CYHhuEObTmaTHqeKvqc7TW_9xywGHpUE8QGBlqCidDK9oScv4NGKyRN0YcyfjVXjG9sw6KdkFXvZ2A8r48yQv9H2IYvjgT8MoTH2Dt4ehWjr2J9Hh87t7X9prNnsyb6GXXBlz-fOhG3daGtza3F2fKlFzsIkQFR65aCX5MmwuIHcyflaF0ZuyY8_gx22S9WQOrzRb2UFaoWPY8kKc"/>
</div>
<!-- Focused Content Card -->
<div class="w-full bg-surface-container-lowest p-10 rounded-xl flex flex-col items-center">
<header class="text-center mb-8">
<h1 class="text-[2.75rem] font-extrabold tracking-tight text-on-surface leading-tight mb-3">Forgot Password?</h1>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-[280px] mx-auto">
                    Enter your registered email address below, and we'll send you a link to reset your password.
                </p>
</header>
<!-- Form Container -->
<form class="w-full space-y-6">
<!-- Input Group -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest border border-outline-variant/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary text-on-surface placeholder:text-outline/60 transition-all shadow-sm" id="email" name="email" placeholder="Email Address" type="email"/>
</div>
<!-- Primary Action -->
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-on-primary font-semibold rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-2 shadow-lg shadow-primary/10" type="submit">
                    Send Reset Link
                </button>
</form>
<!-- Secondary Navigation -->
<footer class="mt-10 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    Remembered your password? 
                    <a class="text-primary hover:text-primary-container underline underline-offset-4 ml-1 transition-colors" href="#">Login</a>
</p>
</footer>
</div>
<!-- Legal Micro-footer -->
<div class="mt-12 text-center">
<p class="text-[10px] uppercase tracking-widest text-outline/50 font-medium">
                © 2024 Pawtry Digital Curator. All rights reserved.
            </p>
</div>
</main>
</body></html>
